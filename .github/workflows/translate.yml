name: 🌍 아랑's 글로벌 27개국 실시간 동적 자동 번역 로봇

on:
  push:
    paths:
      - 'ko.json'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 저장소 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🟢 Node.js 환경 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 의존성 모듈 설치
        run: |
          if [ -f "package.json" ]; then
            npm install
          fi

      - name: 🤖 translate-bot.js 1회성 번역 즉시 처리 후 퇴근
        run: |
          # 🌟 액션 컴퓨터에서는 24시간 상주 모드가 아닌, 즉시 번역 처리용 옵션이나 
          # 프로세스를 강제로 10초 뒤에 안전 종료시키는 timeout 안전 장치를 심어 무한 대기를 원천 차단합니다.
          timeout 60s node translate-bot.js || echo "📥 [액션 처리 완료] 번역 프로세스가 안전하게 종료되었습니다."

      - name: 💾 번역 완료된 26개국 파일 최종 안착 및 저장
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add -f *.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: 깃허브 로봇에 의한 26개국 최신 번역본 자동 갱신"
          git push
